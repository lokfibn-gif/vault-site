<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Message</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fafafa;
  color: #222;
  display: flex;
  justify-content: center;
  padding-top: 80px;
  margin: 0;
}
.card {
  width: 360px;
  padding: 24px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 8px;
}
h2 {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 4px;
}
p.desc {
  font-size: 13px;
  color: #777;
  margin-bottom: 20px;
}
label {
  font-size: 12px;
  color: #555;
  display: block;
  margin-bottom: 4px;
}
input[type="password"] {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
  outline: none;
  box-sizing: border-box;
}
input[type="password"]:focus {
  border-color: #888;
}
button {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  background: #222;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 13px;
  cursor: pointer;
}
button:hover {
  background: #444;
}
.msg {
  font-size: 12px;
  margin-top: 8px;
  min-height: 18px;
}
.hidden {
  display: none;
}
#result {
  margin-top: 16px;
  padding: 14px;
  background: #f0f0f0;
  border-radius: 4px;
  font-size: 15px;
  text-align: center;
  display: none;
}
</style>
</head>
<body>
<div class="card">
  <h2>Encrypted message</h2>
  <p class="desc">Enter the key to view the message.</p>

  <div id="step1">
    <label>Password</label>
    <input type="password" id="masterInput" placeholder="Enter password">
    <button onclick="unlock()">Unlock</button>
    <div class="msg" id="status1"></div>
  </div>

  <div id="step2" class="hidden">
    <button onclick="decryptMessage()">View message</button>
    <div class="msg" id="status2"></div>
  </div>

  <div id="result"></div>
</div>

<script>
const VAULT = {
  masterSalt: 'm4st3r$4lt#2026!',
  masterIV: '3d8278287bd7bb51191e2dcd532d9378',
  encryptedPassword: 'd1ae4800bff8f445dfd3cc21fddfa80dd0cbd572b6ff2935dc512717b0cdf00a',
  msgSalt: 'm3$$4g3#s4lt@256',
  msgIV: '8258275b2e46449592d147f5d421cc84',
  ciphertext: 'cff2ca3dc26c84e13dbef70dcb2ac3aef074b15d735761e7b91c634716853aee'
};

let recoveredKey = null;

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
    km, { name: 'AES-CBC', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

async function decrypt(hex, keyObj, ivHex) {
  const iv = Uint8Array.from(ivHex.match(/.{2}/g).map(b => parseInt(b, 16)));
  const data = Uint8Array.from(hex.match(/.{2}/g).map(b => parseInt(b, 16)));
  const r = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, keyObj, data);
  return new TextDecoder().decode(r);
}

async function unlock() {
  const input = document.getElementById('masterInput').value;
  const s = document.getElementById('status1');
  s.textContent = 'checking...';
  try {
    const key = await deriveKey(input, VAULT.masterSalt);
    const d = await decrypt(VAULT.encryptedPassword, key, VAULT.masterIV);
    recoveredKey = d;
    s.textContent = '';
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
  } catch (e) {
    s.textContent = 'Wrong password.';
  }
}

async function decryptMessage() {
  const s = document.getElementById('status2');
  s.textContent = 'decrypting...';
  try {
    const key = await deriveKey(recoveredKey, VAULT.msgSalt);
    const msg = await decrypt(VAULT.ciphertext, key, VAULT.msgIV);
    document.getElementById('result').style.display = 'block';
    document.getElementById('result').textContent = msg;
    s.textContent = '';
    document.getElementById('step2').classList.add('hidden');
  } catch (e) {
    s.textContent = 'Failed to decrypt.';
  }
}

document.getElementById('masterInput').addEventListener('keypress', e => { if(e.key === 'Enter') unlock(); });
</script>
</body>
</html>
